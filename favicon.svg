<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    :root { color-scheme: light dark; }

    @media (prefers-color-scheme: dark) {
      #glow stop:first-child { stop-color: white; }
      #glow stop:last-child  { stop-color: white; stop-opacity: 0; }
      text { fill: white; }
    }

    @media (prefers-color-scheme: light) {
      #glow stop:first-child { stop-color: black; }
      #glow stop:last-child  { stop-color: black; stop-opacity: 0; }
      text { fill: black; }
    }
  </style>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>
  <text x="32" y="42" font-size="36" font-family="sans-serif" text-anchor="middle">
    A
  </text>
</svg>